<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OwnTalk AI Engine - Final Version</title>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
        }
        body { font-family: 'Pretendard', sans-serif; background: #0b0f19; color: var(--text-main); display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .app-container { width: 100%; max-width: 600px; background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: 24px; padding: 32px; border: 1px solid rgba(255,255,255,0.1); }
        .visualizer-container { width: 100%; height: 100px; background: rgba(0,0,0,0.3); border-radius: 12px; margin: 20px 0; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        .btn-record { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 16px; color: white; font-size: 18px; font-weight: 700; cursor: pointer; }
        .btn-record.recording { background: var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .dashboard { display: none; justify-content: space-around; margin-top: 20px; }
        .ai-comment-box { margin-top: 20px; padding: 15px; background: rgba(59,130,246,0.1); border-radius: 12px; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="text-align:center;">OwnTalk AI Engine</h2>
    <input type="text" id="refText" style="width:100%; padding:15px; background:rgba(0,0,0,0.2); border:1px solid #444; border-radius:10px; color:white;" value="What is the purpose of your visit to the United States">
    <div class="visualizer-container"><canvas id="visualizer"></canvas></div>
    <button id="recordBtn" class="btn-record">🎙️ Tap to Speak</button>
    <div id="dashboard" class="dashboard">
        <div style="text-align:center;"><div id="scoreOverall" style="font-size:30px; font-weight:800;">0</div><div>Overall</div></div>
    </div>
    <div id="aiCommentBox" class="ai-comment-box">
        <div style="color:#a78bfa; font-weight:700;">👩‍🏫 AI Tutor Feedback</div>
        <div id="aiCommentText"></div>
    </div>
</div>

<script>
    const OPENAI_API_KEY = "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";
    let mediaRecorder, audioChunks = [], isRecording = false;
    let audioCtx, analyser, source, animationId;
    
    const canvas = document.getElementById("visualizer"), canvasCtx = canvas.getContext("2d");
    const recordBtn = document.getElementById("recordBtn");

    async function initAudio() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        drawWaveform();
        return stream;
    }

    function drawWaveform() {
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            canvasCtx.fillStyle = "rgba(0,0,0,0.2)";
            canvasCtx.fillRect(0,0,canvas.width,canvas.height);
            canvasCtx.strokeStyle = "#3b82f6";
            canvasCtx.beginPath();
            let sliceWidth = canvas.width / bufferLength;
            for(let i=0; i<bufferLength; i++) {
                let v = dataArray[i]/128.0;
                let y = v * canvas.height/2;
                i === 0 ? canvasCtx.moveTo(0, y) : canvasCtx.lineTo(i*sliceWidth, y);
            }
            canvasCtx.stroke();
        }
        draw();
    }

    recordBtn.addEventListener("click", async () => {
        if (!isRecording) {
            const stream = await initAudio();
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                cancelAnimationFrame(animationId);
                const blob = new Blob(audioChunks, { type: "audio/wav" });
                await analyzeAudio(blob);
            };
            mediaRecorder.start(); isRecording = true; recordBtn.classList.add("recording"); recordBtn.innerText = "Stop Recording";
        } else {
            mediaRecorder.stop(); isRecording = false; recordBtn.classList.remove("recording"); recordBtn.innerText = "Tap to Speak";
        }
    });

    async function analyzeAudio(blob) {
        const formData = new FormData();
        formData.append("file", blob, "audio.wav");
        formData.append("model", "whisper-1");
        const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
            method: "POST", headers: { "Authorization": `Bearer ${OPENAI_API_KEY}` }, body: formData
        });
        const data = await res.json();
        const score = Math.floor(Math.random() * 20) + 80; // 발음 기반 가상 점수 (실제 구현 시 로직 연동)
        document.getElementById("scoreOverall").innerText = score;
        document.getElementById("dashboard").style.display = "flex";
        getAIComment(document.getElementById("refText").value, data.text, score);
    }

    async function getAIComment(ref, user, score) {
        document.getElementById("aiCommentBox").style.display = "block";
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENAI_API_KEY}` },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [{ role: "system", content: `Target: "${ref}". User said: "${user}". Score: ${score}/100. Give short feedback in Korean.` }]
            })
        });
        const data = await res.json();
        document.getElementById("aiCommentText").innerText = data.choices[0].message.content;
    }
</script>
</body>
</html>
