<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwnTalk AI Engine - Final Version</title>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #0b0f19 0%, #1e1b4b 100%); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 600px; background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .header-title { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 30px; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input[type="text"] { width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; color: #fff; font-size: 16px; }
        .visualizer-container { width: 100%; height: 80px; background: rgba(0,0,0,0.3); border-radius: 12px; margin: 24px 0; position: relative; }
        canvas { width: 100%; height: 100%; }
        .btn-record { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 16px; color: white; font-size: 18px; font-weight: 700; cursor: pointer; }
        .btn-record.recording { background: var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .dashboard { display: none; justify-content: space-between; margin-top: 30px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); }
        .score-card { flex: 1; text-align: center; }
        .score-value { font-size: 32px; font-weight: 800; color: #c084fc; }
        .feedback-box { margin-top: 24px; padding: 24px; background: rgba(255,255,255,0.03); border-radius: 16px; font-size: 20px; line-height: 1.8; }
        .w-perfect { color: var(--success); } .w-bad { color: var(--danger); text-decoration: underline wavy; }
        .ai-comment-box { margin-top: 24px; padding: 20px; background: rgba(59,130,246,0.1); border-radius: 16px; border: 1px solid rgba(167,139,250,0.2); display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-title">OwnTalk AI Engine</div>
    <input type="text" id="refText" value="What is the purpose of your visit to the United States">
    <div class="visualizer-container"><canvas id="visualizer"></canvas></div>
    <button id="recordBtn" class="btn-record">🎙️ Tap to Speak</button>
    <div id="dashboard" class="dashboard">
        <div class="score-card"><div class="score-value" id="scoreOverall">0</div><div style="font-size:12px;">Overall</div></div>
        <div class="score-card"><div class="score-value" id="scoreAcc" style="color:var(--success);">0%</div><div style="font-size:12px;">Accuracy</div></div>
    </div>
    <div id="aiCommentBox" class="ai-comment-box">
        <div style="color:#a78bfa; font-weight:700; margin-bottom:8px;">👩‍🏫 AI Tutor Feedback</div>
        <div id="aiCommentText"></div>
    </div>
    <div id="feedbackBox" class="feedback-box" style="display:none;"></div>
</div>

<script>
    const OPENAI_API_KEY = "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";
    let mediaRecorder, audioChunks = [], isRecording = false;
    let audioCtx, analyser, source, animationId; // 추가된 변수들

    const canvas = document.getElementById("visualizer"), canvasCtx = canvas.getContext("2d");
    const recordBtn = document.getElementById("recordBtn");

    // 실시간 파형 그리기 함수
    function drawWaveform() {
        if (!analyser) return;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        
        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            
            canvasCtx.fillStyle = "rgba(0,0,0,0.3)";
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = "#3b82f6";
            canvasCtx.beginPath();
            
            const sliceWidth = canvas.width / bufferLength;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;
                if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
                x += sliceWidth;
            }
            canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();
        }
        draw();
    }

    recordBtn.addEventListener("click", async () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }

        if (!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: true, // 에코 캔슬링 활성화 (파형 데이터에 중요)
                    noiseSuppression: true
                } 
            });
            
            // AudioContext 연결 (파형 시각화용)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            drawWaveform(); // 그리기 시작

            mediaRecorder = new MediaRecorder(stream); audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                cancelAnimationFrame(animationId); // 그리기 중지
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
                await analyzeAudio(audioBlob);
            };
            mediaRecorder.start(); isRecording = true; recordBtn.classList.add("recording"); recordBtn.innerText = "Stop Recording";
        } else {
            mediaRecorder.stop(); isRecording = false; recordBtn.classList.remove("recording"); recordBtn.innerText = "Tap to Speak";
        }
    });

    // ... (이하 analyzeAudio, processResults, getAIComment 함수는 동일하게 유지)
    async function analyzeAudio(audioBlob) {
        const refText = document.getElementById("refText").value;
        const formData = new FormData();
        formData.append("file", audioBlob, "audio.wav");
        formData.append("model", "whisper-1");
        formData.append("response_format", "verbose_json");
        formData.append("prompt", `Target sentence: "${refText}"`);

        const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
            method: "POST", headers: { "Authorization": `Bearer ${OPENAI_API_KEY}` }, body: formData
        });
        const data = await res.json();
        processResults(refText, data.words, data.text);
    }

    function processResults(refText, whisperWords, userSaid) {
        const refArray = refText.toLowerCase().split(/\s+/);
        const feedbackBox = document.getElementById("feedbackBox");
        feedbackBox.innerHTML = "";
        let matchedCount = 0;

        refArray.forEach((word, idx) => {
            const span = document.createElement("span");
            span.innerText = word + " ";
            const userWord = whisperWords && whisperWords[idx] ? whisperWords[idx].word.toLowerCase().replace(/[^\w]/g, "") : "";
            
            if (word.toLowerCase().replace(/[^\w]/g, "") === userWord) {
                span.className = "word w-perfect"; matchedCount++;
            } else {
                span.className = "word w-bad";
            }
            feedbackBox.appendChild(span);
        });

        const overall = Math.round((matchedCount / refArray.length) * 100);
        document.getElementById("scoreOverall").innerText = overall;
        document.getElementById("scoreAcc").innerText = overall + "%";
        document.getElementById("dashboard").style.display = "flex";
        feedbackBox.style.display = "block";
        
        getAIComment(refText, userSaid, overall);
    }

    async function getAIComment(ref, user, score) {
        document.getElementById("aiCommentBox").style.display = "block";
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENAI_API_KEY}` },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [{ role: "system", content: `Target: "${ref}". User said: "${user}". Score: ${score}/100. Give short encouraging feedback in Korean.` }]
            })
        });
        const data = await res.json();
        document.getElementById("aiCommentText").innerText = data.choices[0].message.content;
    }
</script>
</body>
</html>
